<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ohene AI — International Students in South Korea</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='120' height='120' rx='26' fill='%231D9E75'/%3E%3Crect x='10' y='10' width='100' height='100' rx='18' fill='none' stroke='%239FE1CB' stroke-width='2' opacity='0.6'/%3E%3Ctext x='60' y='68' text-anchor='middle' font-family='serif' font-size='48' font-weight='700' fill='%23ffffff'%3E%EC%9C%A0%ED%95%99%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='120' height='120' rx='26' fill='%231D9E75'/%3E%3Crect x='10' y='10' width='100' height='100' rx='18' fill='none' stroke='%239FE1CB' stroke-width='2' opacity='0.6'/%3E%3Ctext x='60' y='68' text-anchor='middle' font-family='serif' font-size='48' font-weight='700' fill='%23ffffff'%3E%EC%9C%A0%ED%95%99%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --text: #1A1A18;
    --text-muted: #6B6B66;
    --text-hint: #A5A59F;
    --user-bubble: #1D9E75;
    --bot-bubble: #F0F0EA;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  .page-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    color: var(--text);
  }
  .page-header h1 span { color: var(--teal); }
  .badge {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--teal-dark);
    background: var(--teal-light);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 4px;
  }

  .chat-window {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    height: 560px;
    overflow: hidden;
  }

  .chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .bot-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .chat-header-text h2 { font-size: 15px; font-weight: 500; color: var(--text); }
  .chat-header-text p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal); margin-left: auto; flex-shrink: 0;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 18px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 8px; max-width: 80%; animation: fadeUp 0.2s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }

  .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.6; border-radius: 18px; }
  .msg.bot .bubble { background: var(--bot-bubble); color: var(--text); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }

  .msg.bot .bubble p { margin: 0 0 8px; }
  .msg.bot .bubble p:last-child { margin-bottom: 0; }
  .msg.bot .bubble ul, .msg.bot .bubble ol { padding-left: 18px; margin: 6px 0 8px; }
  .msg.bot .bubble li { margin-bottom: 4px; }
  .msg.bot .bubble strong { font-weight: 500; }
  .msg.bot .bubble h1, .msg.bot .bubble h2, .msg.bot .bubble h3 { font-size: 14px; font-weight: 500; margin: 10px 0 4px; }
  .msg.bot .bubble h1:first-child, .msg.bot .bubble h2:first-child { margin-top: 0; }
  .msg.bot .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  .typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-hint); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,60%,100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  #chips {
    padding: 10px 18px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .chip {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 5px 12px; border: 1px solid var(--border);
    border-radius: 20px; background: var(--bg);
    color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .chip:hover { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal-mid); }

  #input-row {
    padding: 12px 18px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; flex-shrink: 0;
  }
  #user-input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 9px 14px; border: 1px solid var(--border);
    border-radius: 12px; background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  #user-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  #user-input::placeholder { color: var(--text-hint); }
  #send-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--teal); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: var(--teal-dark); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 16px; height: 16px; }

  #mic-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); flex-shrink: 0; transition: all 0.15s;
  }
  #mic-btn:hover { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal-mid); }
  #mic-btn.listening { background: #FCEBEB; color: #E24B4A; border-color: #F09595; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  #mic-btn svg { width: 16px; height: 16px; }

  #audio-toggle {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); flex-shrink: 0; transition: all 0.15s;
  }
  #audio-toggle:hover { background: var(--teal-light); color: var(--teal-dark); }
  #audio-toggle.on { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal-mid); }
  #audio-toggle svg { width: 16px; height: 16px; }

  .audio-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-hint); margin-top: 4px;
    cursor: pointer; transition: color 0.15s;
  }
  .audio-status:hover { color: var(--teal); }
  .audio-status svg { width: 13px; height: 13px; flex-shrink: 0; }
  .audio-status.loading { color: var(--teal); }
  .audio-status.error { color: #E24B4A; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; }

  .dev-credit {
    width: 100%; max-width: 680px;
    text-align: center; font-size: 12px;
    color: var(--text-hint); margin-top: 16px;
  }
  .dev-credit span { color: var(--teal-dark); font-weight: 500; }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Ohene <span>AI</span></h1>
  </div>
  <span class="badge">AI Assistant</span>
</div>

<div class="chat-window">
  <div class="chat-header">
    <div class="bot-icon">🇰🇷</div>
    <div class="chat-header-text">
      <h2>Ohene AI</h2>
      <p>Visas · Housing · Banking · University Life</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🎓</div>
      <div class="bubble">Hello! My name is Ohene. I'm your Korea international student assistant. Ask me anything — visas, housing, banking, TOPIK, health insurance, and more.</div>
    </div>
  </div>

  <div id="chips">
    <button class="chip" onclick="sendChip(this)">D-2 visa requirements</button>
    <button class="chip" onclick="sendChip(this)">Finding housing near campus</button>
    <button class="chip" onclick="sendChip(this)">Opening a bank account</button>
    <button class="chip" onclick="sendChip(this)">TOPIK exam tips</button>
    <button class="chip" onclick="sendChip(this)">Health insurance in Korea</button>
  </div>

  <div id="input-row">
    <button id="audio-toggle" class="on" onclick="toggleAudio()" title="Toggle voice responses">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    </button>
    <input id="user-input" type="text" placeholder="Ask a question or tap the mic..." autocomplete="off" />
    <button id="mic-btn" onclick="toggleMic()" title="Speak your question">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
    <button id="send-btn" onclick="handleSend()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<div class="dev-credit">Developed by <span>Prof. Duke Ofosu-Anim</span> · Yemyung Graduate University</div>

<script>
let audioEnabled = true;
let recognition = null;
let isListening = false;
let currentAudio = null;
let history = [];
let loading = false;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  document.getElementById('audio-toggle').classList.toggle('on', audioEnabled);
  if (!audioEnabled && currentAudio) { currentAudio.pause(); currentAudio = null; }
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addBotMessage('Sorry, your browser does not support voice input. Please use Chrome or Edge.');
    return;
  }
  if (isListening) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('user-input').placeholder = 'Listening...';
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('user-input').value = transcript;
    sendMessage(transcript);
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => stopMic();
  recognition.start();
}

function stopMic() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('user-input').placeholder = 'Ask a question or tap the mic...';
}

async function speakText(text, statusEl) {
  if (!audioEnabled) return;
  if (statusEl) {
    statusEl.className = 'audio-status loading';
    statusEl.innerHTML = `<svg class="spinning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Generating voice...`;
  }
  try {
    const clean = text.replace(/[#*`_~]/g, '').replace(/\n+/g, ' ').trim();
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: clean.slice(0, 500) })
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.play();
    if (statusEl) {
      statusEl.className = 'audio-status';
      statusEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Playing`;
      currentAudio.onended = () => { if (statusEl) statusEl.innerHTML = ''; };
    }
  } catch (e) {
    if (statusEl) {
      statusEl.className = 'audio-status error';
      statusEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Voice failed — <u>retry</u>`;
      statusEl.onclick = () => speakText(text, statusEl);
    }
  }
}



function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">👤</div><div class="bubble">${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const rendered = typeof marked !== 'undefined' ? marked.parse(text) : escapeHtml(text);
  const statusEl = document.createElement('div');
  statusEl.className = 'audio-status';
  div.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble">${rendered}</div>`;
  div.querySelector('.bubble').appendChild(statusEl);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return statusEl;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage(text) {
  if (loading || !text.trim()) return;
  loading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('user-input').value = '';

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    history.push({ role: 'assistant', content: data.reply });
    removeTyping();
    const statusEl = addBotMessage(data.reply);
    speakText(data.reply, statusEl);
  } catch (e) {
    removeTyping();
    addBotMessage('Sorry, something went wrong: ' + e.message);
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

function handleSend() {
  const val = document.getElementById('user-input').value.trim();
  if (val) sendMessage(val);
}

function sendChip(btn) { sendMessage(btn.textContent); }

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});
</script>
</body>
</html>
